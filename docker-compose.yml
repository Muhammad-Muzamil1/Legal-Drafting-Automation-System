version: "3.8"

services:

  template-service:
    build: ./template-service
    ports:
      - "8080:8080"
  
  document-service:
    build:  ./document-service
    ports:
      - "8082:8082"

  draft-service:
    build: ./draft-service
    ports:
      - "8081:8081"
    depends_on:
      - template-service

  api-gateway-service:
    build: ./api-gateway-service
    ports:
      - "8083:8083"
    depends_on:
      - document-service
      - template-service

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
