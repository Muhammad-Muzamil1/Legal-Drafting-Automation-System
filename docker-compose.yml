version: "3.8"

services:

  template-service:
    build: ./TemplateService
    ports:
      - "8080:8080"
  
  document-service:
    build:  ./DocumentService
    ports:
      - "8082:8082"

  draft-service:
    build: ./DraftService
    ports:
      - "8081:8081"
    depends_on:
      - template-service

  api-gateway-service:
    build: ./ApiGateway
    ports:
      - "8083:8083"
    depends_on:
      - document-service
      - template-service

  frontend:
    build: ./Frontend
    ports:
      - "5173:5173"
